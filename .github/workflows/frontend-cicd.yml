name: Frontends CICD

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "23"

jobs:
  dependencies:
    name: Install Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mairie360'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: dependencies
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
      - run: npm run lint

  build:
    name: Build Check (Next.js)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
      - run: npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
      - run: npm test --if-present

  release-dev:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: Dev
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
      - name: Build & Push Images (Dev)
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="ghcr.io/$OWNER_LOWER"
          docker build . --build-arg NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -t $REPO/${{ inputs.package_name }}:dev-$SHA_TAG \
            -t $REPO/${{ inputs.package_name }}:dev-latest
          docker push $REPO/${{ inputs.package_name }} --all-tags

  release-staging:
    needs: release-dev
    runs-on: ubuntu-latest
    environment: Staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
      - name: Build & Push (Staging)
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="ghcr.io/$OWNER_LOWER"
          docker build . --build-arg NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -t $REPO/${{ inputs.package_name }}:staging-$SHA_TAG \
            -t $REPO/${{ inputs.package_name }}:staging-latest
          docker push $REPO/${{ inputs.package_name }} --all-tags

  release-prod:
    needs: release-staging
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Calculate & Create Tag
        id: set_tag
        uses: ./.github/actions/semantic-tag
  
      - name: Build & Push Front
        if: steps.set_tag.outputs.new_release_published == 'true'
        run: |
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          TAG=${{ steps.set_tag.outputs.new_release_version }}
          docker build . --build-arg NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -t $REPO/${{ inputs.package_name }}:$TAG -t $REPO/${{ inputs.package_name }}:latest
          docker push $REPO/${{ inputs.package_name }} --all-tags
