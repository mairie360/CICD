name: Frontends CICD

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "23"

jobs:
  dependencies:
    name: Install Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mairie360'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: dependencies
    steps:
      - uses: actions/checkout@v4
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
      - run: npm run lint

  build:
    name: Build Check (Next.js)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
      - run: npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
      - run: npm test --if-present

  release-dev:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: Dev
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
      
      - name: Build & Push Image (Source of Truth)
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          # Build unique avec les secrets pour les packages privés
          docker build . --build-arg NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -t $REPO/${{ inputs.package_name }}:dev-$SHA_TAG \
            -t $REPO/${{ inputs.package_name }}:dev-latest
          docker push $REPO/${{ inputs.package_name }} --all-tags

  release-staging:
    needs: release-dev
    runs-on: ubuntu-latest
    environment: Staging
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
      
      - name: Promote Image to Staging
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          docker pull $REPO/${{ inputs.package_name }}:dev-$SHA_TAG
          docker tag $REPO/${{ inputs.package_name }}:dev-$SHA_TAG $REPO/${{ inputs.package_name }}:staging-$SHA_TAG
          docker tag $REPO/${{ inputs.package_name }}:dev-$SHA_TAG $REPO/${{ inputs.package_name }}:staging-latest
          docker push $REPO/${{ inputs.package_name }} --all-tags

  release-prod:
    needs: release-staging
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      contents: write
      packages: write
    outputs:
      PUBLISHED: ${{ steps.set_tag.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Calculate & Create Tag
        id: set_tag
        uses: ./.github/actions/semantic-tag
  
      - name: Log in to GHCR
        if: steps.set_tag.outputs.new_release_published == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
  
      - name: Promote Image to Prod
        if: steps.set_tag.outputs.new_release_published == 'true'
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          TAG=${{ steps.set_tag.outputs.new_release_version }}
          
          docker pull $REPO/${{ inputs.package_name }}:staging-$SHA_TAG
          docker tag $REPO/${{ inputs.package_name }}:staging-$SHA_TAG $REPO/${{ inputs.package_name }}:$TAG
          docker tag $REPO/${{ inputs.package_name }}:staging-$SHA_TAG $REPO/${{ inputs.package_name }}:latest
          docker push $REPO/${{ inputs.package_name }} --all-tags

  cleanup:
    name: Cleanup
    needs: release-prod
    if: needs.release-prod.outputs.PUBLISHED == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete Obsolete Front Images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ inputs.package_name }}
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-pre-release-versions: 'true'