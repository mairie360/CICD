name: Back lib CICD

on:
  workflow_call:
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: true

jobs:
  dependencies:
    name: Setup & Fetch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Download Dependencies
        run: cargo fetch

      - name: Pre-compile dependencies
        run: cargo check --release

  lint:
    name: Check lint
    runs-on: ubuntu-latest
    needs: dependencies
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run lint_check
        uses: actions-rs/cargo@v1
        with:
          command: lint_check
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: target/release/
          retention-days: 1

  unit_test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build, lint]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Rust Tests
        run: cargo test --release
    
  publish_release:
    if: github.ref == 'refs/heads/main'
    environment: Release
    needs: unit_test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PK }}
  
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0
  
      - name: Calculate & Create Tag
        id: set_tag
        uses: ./.github/actions/semantic-tag
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
  
      - name: Setup Rust & Cargo Release
        if: steps.set_tag.outputs.new_release_published == 'true'
        uses: dtolnay/rust-toolchain@stable
  
      - name: Publish to Cargo
        if: steps.set_tag.outputs.new_release_published == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish # On utilise simple publish car le tag existe déjà