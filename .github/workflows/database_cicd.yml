name: Database CI/CD

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
    secrets:
      GH_PAT:
        required: true

jobs:
  release-dev:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
      - name: Build & Push Images (Dev)
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          docker build -t $REPO/${{ inputs.package_name }}:dev-$SHA_TAG -t $REPO/${{ inputs.package_name }}:dev-latest .
          docker push $REPO/${{ inputs.package_name }} --all-tags
          docker build -t $REPO/liquibase-migrations:dev-$SHA_TAG -t $REPO/liquibase-migrations:dev-latest ./liquibase
          docker push $REPO/liquibase-migrations --all-tags

  release-staging:
    needs: release-dev
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
      - name: Build & Push Images (Staging)
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          docker build -t $REPO/${{ inputs.package_name }}:staging-$SHA_TAG -t $REPO/${{ inputs.package_name }}:staging-latest .
          docker push $REPO/${{ inputs.package_name }} --all-tags
          docker build -t $REPO/liquibase-migrations:staging-$SHA_TAG -t $REPO/liquibase-migrations:staging-latest ./liquibase
          docker push $REPO/liquibase-migrations --all-tags

  release-prod:
    needs: release-staging
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Calculate & Create Tag
        id: set_tag
        uses: ./.github/actions/semantic-tag
  
      - name: Build & Push DB & Migrations
        if: steps.set_tag.outputs.new_release_published == 'true'
        run: |
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          TAG=${{ steps.set_tag.outputs.new_release_version }}
          docker build -t $REPO/${{ inputs.package_name }}:$TAG .
          docker build -t $REPO/liquibase-migrations:$TAG ./liquibase
          docker push $REPO/${{ inputs.package_name }}:$TAG
          docker push $REPO/liquibase-migrations:$TAG