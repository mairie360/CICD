name: Reusable CI/CD Pipeline

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  storybook:
    name: Storybook Chain
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: releasee
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Check if src/ has changed
        id: check_src
        run: |
          git fetch origin main
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD^ HEAD | grep '^src/' || true)
          else
            CHANGED="true"
          fi
          echo "changed=$([[ -n \"$CHANGED\" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        if: steps.check_src.outputs.changed == 'true'
        run: npm ci
      - name: Build Storybook
        if: steps.check_src.outputs.changed == 'true'
        run: npm run build-storybook
      - name: Upload Storybook artifact
        if: steps.check_src.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static
      - name: Deploy to GitHub Pages
        if: steps.check_src.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v5

  package:
    name: Package Publish
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PACKAGES_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com/
          scope: '@mairie360'
      - name: Install dependencies
        run: npm ci
      - name: Build package
        run: npm run build
      - name: Bump patch version from latest GitHub tag
        id: bump
        shell: bash
        run: |
          LATEST_VERSION=$(
            git ls-remote --tags --refs origin 'v*' \
              | sed -E 's#.*refs/tags/v?([0-9]+\.[0-9]+\.[0-9]+)$#\1#; t; d' \
              | sort -V \
              | tail -n 1
          )

          if [ -z "$LATEST_VERSION" ]; then
            LATEST_VERSION="0.0.0"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          PATCH=$((PATCH + 1))

          if [ "$PATCH" -ge 10 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi

          if [ "$MINOR" -ge 10 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"

          npm version "$VERSION" --no-git-tag-version
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Commit version and create git tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          VERSION="${{ steps.bump.outputs.version }}"
          TAG="${{ steps.bump.outputs.tag }}"

          if [ -z "$TAG" ]; then
            echo "::error::Release tag is empty"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin"
            exit 1
          fi

          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          if [ -f npm-shrinkwrap.json ]; then
            git add npm-shrinkwrap.json
          fi

          if git diff --cached --quiet; then
            echo "No version files changed; skipping release commit"
          else
            git commit -m "chore(release): $VERSION [skip ci]"
          fi

          git tag "$TAG"
          git push origin "$TAG"
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: npm publish --access public
