name: Reusable CI/CD Pipeline

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  storybook:
    name: Storybook Chain
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: releasee
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Check if src/ has changed
        id: check_src
        run: |
          git fetch origin main
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD^ HEAD | grep '^src/' || true)
          else
            CHANGED="true"
          fi
          echo "changed=$([[ -n \"$CHANGED\" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
      - name: Install dependencies
        if: steps.check_src.outputs.changed == 'true'
        run: npm ci
      - name: Build Storybook
        if: steps.check_src.outputs.changed == 'true'
        run: npm run build-storybook
      - name: Upload Storybook artifact
        if: steps.check_src.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static
      - name: Deploy to GitHub Pages
        if: steps.check_src.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v5

  package:
    name: Package Publish
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PACKAGES_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com/
          scope: '@mairie360'
      - name: Install dependencies
        run: npm ci
      - name: Build package
        run: npm run build
      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(npm version patch --no-git-tag-version | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG="v${{ steps.bump.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: npm publish --access public