name: BFFs CICD

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
        description: "Nom de l'image Docker et du package"
      node_version:
        required: false
        type: string
        default: "20"
        description: "Version de Node.js"

jobs:
  dependencies:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mairie360'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

  lint:
    name: Lint code
    runs-on: ubuntu-latest
    needs: dependencies
    steps:
      - uses: actions/checkout@v4
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - run: npm run lint

  build:
    name: Build & OpenAPI Spec
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      
      - run: npm run build
      
      - name: Generate OpenAPI Spec
        run: npm run openapi:generate > openapi-spec.json

      - name: Upload Build & Spec
        uses: actions/upload-artifact@v4
        with:
          name: bff-assets
          path: |
            dist/
            openapi-spec.json

  test:
    name: Test Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - run: npm test

  release-dev:
    name: Release Dev
    if: github.ref == 'refs/heads/main'
    needs: test
    environment: Dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Spec
        uses: actions/download-artifact@v4
        with:
          name: bff-assets
          path: .

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Build & Push Image (Source of Truth)
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          echo "@mairie360:registry=https://npm.pkg.github.com" > .npmrc_tmp
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc_tmp

          docker build \
            --secret id=npmrc,src=.npmrc_tmp \
            -t $REPO/${{ inputs.package_name }}:dev-$SHA_TAG \
            -t $REPO/${{ inputs.package_name }}:dev-latest .
          
          docker push $REPO/${{ inputs.package_name }} --all-tags
          rm .npmrc_tmp

      - name: Publish OpenAPI (Dev)
        uses: mairie360/CICD/actions/publish-openapi-typescript@mair-56-setup-open-api-gen
        with:
          package_name: ${{ inputs.package_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 0.0.0-dev.${{ github.sha }}
          spec_file: ./openapi-spec.json

  release-staging:
    name: Release Staging
    needs: release-dev
    environment: Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download Spec
        uses: actions/download-artifact@v4
        with:
          name: bff-assets
          path: .

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Promote Image to Staging
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          docker pull $REPO/${{ inputs.package_name }}:$SHA_TAG
          docker tag $REPO/${{ inputs.package_name }}:dev-$SHA_TAG $REPO/${{ inputs.package_name }}:staging-$SHA_TAG
          docker tag $REPO/${{ inputs.package_name }}:dev-$SHA_TAG $REPO/${{ inputs.package_name }}:staging-latest
          docker push $REPO/${{ inputs.package_name }} --all-tags

      - name: Publish OpenAPI (Staging)
        uses: mairie360/CICD/actions/publish-openapi-typescript@mair-56-setup-open-api-gen
        with:
          package_name: ${{ inputs.package_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 0.0.0-staging.${{ github.sha }}
          spec_file: ./openapi-spec.json

  release-prod:
    name: Release Prod
    needs: release-staging
    environment: Prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      PUBLISHED: ${{ steps.set_tag.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Spec
        uses: actions/download-artifact@v4
        with:
          name: bff-assets
          path: .

      - name: Calculate & Create Tag
        id: set_tag
        uses: ./.github/actions/semantic-tag

      - name: Log in to GHCR
        if: steps.set_tag.outputs.new_release_published == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Promote Image to Prod
        if: steps.set_tag.outputs.new_release_published == 'true'
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          TAG=${{ steps.set_tag.outputs.new_release_version }}
          docker pull $REPO/${{ inputs.package_name }}:staging-$SHA_TAG
          docker tag $REPO/${{ inputs.package_name }}:staging-$SHA_TAG $REPO/${{ inputs.package_name }}:$TAG
          docker tag $REPO/${{ inputs.package_name }}:staging-$SHA_TAG $REPO/${{ inputs.package_name }}:latest
          docker push $REPO/${{ inputs.package_name }} --all-tags

      - name: Publish OpenAPI (Prod)
        if: steps.set_tag.outputs.new_release_published == 'true'
        uses: mairie360/CICD/actions/publish-openapi-typescript@mair-56-setup-open-api-gen
        with:
          package_name: ${{ inputs.package_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ steps.set_tag.outputs.new_release_version }}
          spec_file: ./openapi-spec.json

  cleanup:
    name: Cleanup
    needs: release-prod
    if: needs.release-prod.outputs.PUBLISHED == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete Obsolete Images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ inputs.package_name }}
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-pre-release-versions: 'true'