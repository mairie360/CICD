name: APIs CICD

on:
  workflow_call:
    inputs:
      postman_collection:
        required: true
        type: string
      postman_environment:
        required: true
        type: string
      package_name:
        required: false
        type: string
        description: "Image base name"
    secrets:
      POSTMAN_API_KEY:
        required: true

jobs:
  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          toolchain: stable
          override: true

      - name: Download Dependencies
        run: cargo fetch

      - name: Cache Cargo Dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

  lint:
    name: Check lint
    runs-on: ubuntu-latest
    needs: dependencies

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Run lint_check
        uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 # v1
        with:
          command: lint_check

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          toolchain: stable
          override: true

      - name: Restore Cargo Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Project
        uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 # v1
        with:
          command: build
          args: --release

      - name: Cache Cargo Build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

  unit_test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          toolchain: stable
          override: true

      - name: Restore Cargo Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Run Rust Tests
        uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 # v1
        with:
          command: test

  integration_tests:
      name: Postman Tests
      runs-on: ubuntu-latest
      needs: unit_test
  
      steps:
        - name: Checkout repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  
        - name: Build and start services
          run: docker compose up -d --build
  
        - name: Install Postman CLI
          run: |
            curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
  
        - name: Login to Postman CLI
          run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
  
        - name: Run Postman tests
          run: |
            postman collection run "${{ inputs.postman_collection }}" \
              -e "${{ inputs.postman_environment }}" \
              --bail
  
        - name: Tear down
          if: always()
          run: docker compose down

  release-dev:
    if: github.ref == 'refs/heads/main'
    needs: integration_tests
    environment: Dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Build & Push Images (Dev)
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"

          # Build & Push Images (Dev)
          docker build -t $REPO/${{ inputs.package_name }}:dev-$SHA_TAG -t $REPO/${{ inputs.package_name }}:dev-latest .
          docker push $REPO/${{ inputs.package_name }} --all-tags
          
      - name: Publish OpenAPI
        uses: mairie360/CICD/actions/publish-openapi-rust@mair-56-setup-open-api-gen
        with:
          package_name: ${{ inputs.package_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 0.0.0-dev.${{ github.sha }}
    env:
      GH_TOKEN: ${{ github.token }}

  release-staging:
    needs: release-dev
    runs-on: ubuntu-latest
    environment: Staging
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Build & Push Images (Staging)
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"

          # On utilise le tag 'staging' pour isoler les images de test
          docker build -t $REPO/${{ inputs.package_name }}:staging-$SHA_TAG -t $REPO/${{ inputs.package_name }}:staging-latest .
          docker push $REPO/${{ inputs.package_name }} --all-tags
          
      - name: Publish OpenAPI
        uses: mairie360/CICD/actions/publish-openapi-rust@mair-56-setup-open-api-gen
        with:
          package_name: ${{ inputs.package_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 0.0.0-staging.${{ github.sha }}
    env:
      GH_TOKEN: ${{ github.token }}

  release-prod:
    needs: release-staging
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      contents: write
      packages: write
    outputs:
      TAG: ${{ steps.set_tag.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Calculate & Create Tag
        id: set_tag
        uses: ./.github/actions/semantic-tag
  
      - name: Log in to GHCR
        if: steps.set_tag.outputs.new_release_published == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
  
      - name: Build & Push Images (Prod)
        if: steps.set_tag.outputs.new_release_published == 'true'
        run: |
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          TAG=${{ steps.set_tag.outputs.new_release_version }}
          docker build -t $REPO/${{ inputs.package_name }}:$TAG -t $REPO/${{ inputs.package_name }}:latest .
          docker push $REPO/${{ inputs.package_name }} --all-tags
  
      - name: Publish OpenAPI
        if: steps.set_tag.outputs.new_release_published == 'true'
        uses: mairie360/CICD/actions/publish-openapi-rust@mair-56-setup-open-api-gen
        with:
          package_name: ${{ inputs.package_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ steps.set_tag.outputs.new_release_version }}
