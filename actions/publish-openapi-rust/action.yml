name: "Publish OpenAPI from Rust"
description: "Extrait le contrat d’une API Rust et publie les types TS"

inputs:
  version:
    required: true
    description: "Version du package à publier"
  package_name:
    required: true
    description: "Nom du package à publier"
  token:
    required: true
    description: "Token d'authentification pour npm"

runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        ORG=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        SAFE_NAME=$(echo "${{ inputs.package_name }}" | tr '[:upper:]' '[:lower:]')

        # 1. Nettoyer tout ancien build pour éviter les résidus
        rm -rf ./generated
        mkdir -p ./generated

        # 2. Générer le JSON depuis Rust
        # On le génère à la racine temporairement
        cargo open_api > openapi.json

        # 3. Générer le CLIENT COMPLET dans le dossier de destination
        # 'openapi-typescript-codegen' va remplir ./generated
        npm install orval -D

        # 4. Générer le CLIENT COMPLET dans le dossier de destination
        # 'openapi-typescript-codegen' va remplir ./generated
        npx orval

        # 5. Créer le package.json directement DANS generated
        # Note: 'openapi-typescript-codegen' génère un index.ts à la racine de l'output
        cat <<EOF > generated/package.json
        {
          "name": "@${ORG}/${SAFE_NAME}-openapi",
          "version": "${{ inputs.version }}",
          "main": "./index.ts",
          "types": "./index.ts",
          "dependencies": {
            "axios": "^1.0.0"
          },
          "publishConfig": {
            "registry": "https://npm.pkg.github.com"
          }
        }
        EOF

        # 6. Configuration NPM locale au dossier de publication
        echo "@${ORG}:registry=https://npm.pkg.github.com" > generated/.npmrc
        echo "//npm.pkg.github.com/:_authToken=${{ inputs.token }}" >> generated/.npmrc

        # 7. PUBLICATION : L'étape cruciale
        # En entrant dans le dossier, npm ignore totalement le contenu du dossier parent (Rust)
        cd generated
        npm publish --access restricted
