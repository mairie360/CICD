name: 'Publish OpenAPI from TypeScript'
description: 'Extrait le contrat d’un BFF TS et publie les types'

inputs:
  version:
    required: true
  package_name:
    required: true
  token:
    required: true

runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        ORG=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        SAFE_NAME=$(echo "${{ inputs.package_name }}" | tr '[:upper:]' '[:lower:]')

        # 1. Écraser TOUTE configuration existante pour éviter les conflits
        # On crée le .npmrc directement à la racine du projet actuel
        echo "@${ORG}:registry=https://npm.pkg.github.com" > .npmrc
        echo "//npm.pkg.github.com/:_authToken=${{ inputs.token }}" >> .npmrc

        # On s'assure que npm utilise BIEN ce fichier
        export NPM_CONFIG_USERCONFIG=$(pwd)/.npmrc

        # 2. Installation (maintenant le token est forcément lu depuis le .npmrc local)
        if [ ! -d "node_modules" ]; then
          echo "📦 Installation des dépendances..."
          npm install --legacy-peer-deps --no-audit --no-fund
        fi

        # 3. Extraction du swagger
        echo "🔍 Extraction du swagger..."
        npm run openapi:extract 

        # 4. Génération des types
        echo "🛠️ Génération des types..."
        npx openapi-typescript openapi.json -o index.d.ts

        # 5. Préparation du dossier de publication
        mkdir -p dist_pkg
        cat <<EOF > dist_pkg/package.json
        {
          "name": "@${ORG}/${SAFE_NAME}-openapi",
          "version": "${{ inputs.version }}",
          "main": "index.d.ts",
          "types": "index.d.ts",
          "publishConfig": { "registry": "https://npm.pkg.github.com" }
        }
        EOF
        
        mv index.d.ts dist_pkg/
        
        # 6. Finalisation de la structure et publication
        # On copie le .npmrc dans le dossier dist pour que npm publish soit authentifié
        cp .npmrc dist_pkg/.npmrc

        echo "🚀 Publication du package @${ORG}/${SAFE_NAME}-openapi..."
        
        # On entre dans le dossier et on publie
        cd dist_pkg
        npm publish

        echo "✅ Terminé !"