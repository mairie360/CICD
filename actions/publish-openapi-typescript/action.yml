name: 'Publish OpenAPI from TypeScript'
description: 'Extrait le contrat d’un BFF TS et publie les types'

inputs:
  version:
    required: true
  package_name:
    required: true
  token:
    required: true

runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        ORG=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        SAFE_NAME=$(echo "${{ inputs.package_name }}" | tr '[:upper:]' '[:lower:]')

        # 1. Auth & Install (inchangé)
        echo "@${ORG}:registry=https://npm.pkg.github.com" > .npmrc
        echo "//npm.pkg.github.com/:_authToken=${{ inputs.token }}" >> .npmrc
        export NPM_CONFIG_USERCONFIG=$(pwd)/.npmrc
        npm install --legacy-peer-deps

        # 2. Extraction (Génère openapi.json)
        npm run openapi:extract 

        # 3. Génération du SDK complet (Services + Models)
        # On utilise axios par défaut pour les fonctions appelables
        npx openapi-typescript-codegen --input openapi.json --output ./dist_pkg/sdk --client axios

        # 4. Préparation du package.json dans dist_pkg
        cat <<EOF > dist_pkg/package.json
        {
          "name": "@${ORG}/${SAFE_NAME}-openapi",
          "version": "${{ inputs.version }}",
          "main": "./sdk/index.js",
          "types": "./sdk/index.d.ts",
          "publishConfig": { "registry": "https://npm.pkg.github.com" }
        }
        EOF

        # 5. Compilation du SDK (Optionnel mais recommandé si tu veux du JS pur)
        # Si tu publies pour d'autres projets TS, le dossier /sdk généré suffit souvent.
        # Sinon, on s'assure que le point d'entrée pointe sur le index.ts généré.
        
        cp .npmrc dist_pkg/.npmrc

        # 6. Publication
        cd dist_pkg
        npm publish